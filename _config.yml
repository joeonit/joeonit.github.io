title: Youssef's Blog
tagline: Thoughts, notes, and writing.
description: >-
  A simple blog built with Jekyll and hosted on GitHub Pages.
author:
  name: Youssef
email: youssefups1@gmail.com

# Site lives at the root of the user site (https://joeonit.github.io/)
url: "https://joeonit.github.io"
baseurl: ""

theme: minima

plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Show post excerpts on the home page
show_excerpts: true

# Pages to link in the top navigation
header_pages:
  - about.md

# Don't process these when building
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md
